<!DOCTYPE html>
<html>
  <head>
    <title>Input</title>
    <!-- PyScript CSS -->
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2024.1.1/core.css"
    />
    <!-- This script tag bootstraps PyScript -->
    <script
      type="module"
      src="https://pyscript.net/releases/2024.1.1/core.js"
    ></script>
  </head>
  <body>
    <h1>Input</h1>
    <input type="text" id="my_input" placeholder="Enter your name" />
    <button type="button" id="my_button">Submit</button>
    <p id="output"></p>
    <script type="py">
      from browser import document
      @when("click", target="#submit")
      def greet(event):
          name = document["my_input"].value
          document["output"].text = f"Hello, {name}!"
          display("Hello, " + name + "!")
    </script>
  </body>
</html>
