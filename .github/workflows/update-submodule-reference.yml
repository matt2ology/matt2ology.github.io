name: Update Submodule Reference

on:
  push:
    paths:
      - "content/**" # Trigger only when submodule files are updated
    branches:
      - "main" # Runs on pushes targeting the default branch
  workflow_dispatch: # Allows manual workflow triggering from the Actions tab
  schedule:
    - cron: "0 12 * * FRI" # Run every Friday at 12:00 UTC

jobs:
  update-submodule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Fetch submodules as well

      - name: Debug Checkout
        run: |
          echo "Checked out the main repository."
          echo "Current directory: $(pwd)"
          echo "Contents:"
          ls -la
          echo "Submodules fetched successfully."

      - name: Update Submodule
        run: |
          echo "Navigating to the submodule directory."
          cd content
          echo "Current directory: $(pwd)"
          echo "Pulling latest changes for the submodule with rebase."
          git pull --rebase origin main || {
            echo "Conflict detected. Resolving conflicts by favoring remote changes."
            git checkout --theirs .
            git add .
            git rebase --continue || echo "Rebase completed with conflict resolution."
          }
          echo "Submodule updated successfully. Returning to the main repo."
          cd -

      - name: Debug Commit
        run: |
          echo "Commit created. Verifying commit status."
          git log -1
          git status

      - name: Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.TECH_JOURNAL_AND_BLOG_TOKEN }} # Use the personal access token instead of the default GITHUB_TOKEN
        run: |
          echo "Pushing changes to the repository."
          git push origin HEAD
