name: Update Submodule Reference

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # Run every day at 3 AM UTC

jobs:
  update-submodule:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to push changes to the repository

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: "true" # Ensure submodules are checked out

      # Update the submodule to the latest commit
      - name: Update submodule
        run: |
          git submodule update --remote --merge

      # Check if there are any changes in the submodule reference
      - name: Check for changes
        run: |
          if ! git diff --quiet; then
            echo "Submodule reference updated."
            git add .
            git commit -m "Updated submodule reference"
            git push
          else
            echo "No changes in submodule reference."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAGES_TECH_JOURNAL_BLOG }}
